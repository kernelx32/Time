<!DOCTYPE html>
<html>
<body>
<script>
function getTime() {
  const now = new Date();

  const formatted =
    (now.getMonth()+1) + "/" +
    now.getDate() + "/" +
    now.getFullYear() + " " +
    ((now.getHours()%12)||12) + ":" +
    now.getMinutes().toString().padStart(2,'0') + ":" +
    now.getSeconds().toString().padStart(2,'0') + " " +
    (now.getHours() >= 12 ? "pm" : "am");

  document.body.innerText = formatted;
}

getTime();
</script>
</body>
</html>
